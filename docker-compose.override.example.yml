# Optional local use: copy to `docker-compose.override.yml` in the same directory.
# Compose merges overrides automatically so you get host port mappings for the
# production stack when testing without Coolify (e.g. http://localhost:8080).
#
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# docker-compose.override.yml is gitignored — do not commit secrets there.

services:
  api:
    ports:
      - "${API_PORT:-9001}:9001"
  web:
    ports:
      - "${WEB_PORT:-8080}:80"
