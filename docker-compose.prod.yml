# Production stack for VPS / Coolify (Docker Compose)
# Same services as docker-compose.yml — keep both files in sync when editing.
# Set env in Coolify UI or a .env file next to this compose file.
#
# Required:
#   JWT_SECRET          — strong random string (min 32 chars)
#   VITE_API_URL        — public URL of the API as seen by the browser, e.g. https://api.yourdomain.com
#   CORS_ORIGIN         — public URL of the web app, e.g. https://app.yourdomain.com
#
# Optional:
#   POSTGRES_PASSWORD   — default postgres if unset
#   API_BASE_URL        — public API URL (logo links, emails); often same origin as VITE_API_URL
#   APP_URL             — public web URL for password-reset links

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: brs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    # No host ports — Coolify proxies over the Docker network. See docker-compose.override.example.yml for local.
    environment:
      NODE_ENV: production
      PORT: "9001"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/brs_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      UPLOAD_DIR: /app/uploads
      API_BASE_URL: ${API_BASE_URL:-}
      APP_URL: ${APP_URL:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    # No host ports — Coolify proxies over the Docker network. See docker-compose.override.example.yml for local.
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
